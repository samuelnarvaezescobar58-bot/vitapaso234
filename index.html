<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <title>VitaPaso 2.0</title>
    <link rel="stylesheet" href="./style.css">

  </head>
    
  <body>
  <div class="container">

<h1>VitaPaso</h1>
<p class="frase">Pequeños pasos diarios crean grandes cambios.</p>
<p class="desc">Proyecto institucional enfocado en mejorar hábitos saludables.</p>

<hr>

<h2>Perfil</h2>

<div class="perfil">

<input id="nombre" placeholder="Tu nombre">
<input id="edad" placeholder="Edad">
<input id="peso" placeholder="Peso (kg)">
<input id="altura" placeholder="Altura (cm)">

<button onclick="guardarPerfil()">Guardar perfil</button>

<p id="saludo"></p>

</div>

<hr>

<h2>Hábitos del día</h2>

<div id="habitos" class="habitos"></div>

<h2>Progreso diario</h2>

<div class="barra">
<div id="progreso"></div>
</div>

<p id="porcentaje">0%</p>

<hr>

<h2>Estadísticas</h2>

<p>Total hábitos completados: <span id="totalHabitos">0</span></p>

<hr>

<h2>Asistente VitaPaso</h2>

<div id="chatBox" class="chatBox"></div>

<input id="userInput" placeholder="Pregunta algo sobre hábitos o salud">
<button onclick="enviar()">Enviar</button>

</div>
    <script  src="./script.js"></script>

  </body>
  
</html>
